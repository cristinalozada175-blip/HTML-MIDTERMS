<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: rosybrown;">
    <form action="">
        <table border="0" align="center" style="background-color: rgb(222, 174, 174);">
        <tr style="background-color: rgb(225, 148, 148);" >
            <th colspan="6"><h1>REGISTRATION YOUR ACCOUNT</h1></th>
            
        </tr>
        <tr >
            <td><h3>First Name:*</h3></td>
            <td><input type="text" name="" id="" required></td>
            <td><h3>Middle Name:</h3></td>
            <td><input type="text" name="" id=""></td>
            <td><h3>Last Name:*</h3></td>
            <td><input type="text" name="" id="" required></td>
        </tr>

        <tr>
            <td><h3>Birthday:*</h3></td>
            <td><input type="date" name="" id="" required></td> 
            <td><h3>Birthplace:*</h3></td>
            <td><input type="text" name="" id="" required></td>
             <td><h3>Age:*</h3></td>
            <td><input type="text" name="" id="" required></td>
        </tr>
        
        <tr>
            <td><h3>Your Level:*</h3></td>
            <td>
                <select name="" id="" required>
                <option value="">Select Year Level</option>
                <option value="">1st Year</option>
                <option value="">2nd Year</option>
                <option value="">3rd Year</option>
                <option value="">4th Year</option>
            </select> 
            </td>
            <td ><h3>course:*</h3></td>
            <td colspan="2">
                <select name="Select" id="" required>
                <option value="">Select Course</option>
                <option value="">ACT (Associate in Computer Technology)</option>
                <option value="">BSOA (Business Office Administration)</option>
                <option value="">ENTREP(Entreprenuership)</option>
                <option value="">HM (Hospitality Management)</option>
                <option value="">CT (Computer Technology)</option>
            </select> 
            </td>
        </tr>
        <tr>
            <td><h3>Citizenship:*</h3></td>
            <td>
                <select name="" id="" required>
                <option value="">Filipino</option>
                <option value="">American</option>
                <option value="">Chinese</option>
                <option value="">Japanese</option>
                <option value="">Indian</option>
            </select> 
            </td>
            <td><h3>Sex:*</h3></td>
            <td>
                <input type="radio" name="gender" id="Male" required> 
                <label for="Male">Male</label>
                <input type="radio" name="gender" id="Female" required> 
                <label for="Female">Female</label>
            </td>
            <td ><h3>course:*</h3></td>
            <td>
                <select name="Select" id="" required>
                <option value="">Single</option>
                <option value="">Married</option>
                <option value="">Widowed</option>
            </select> 
            </td>
        </tr>

        <tr>
            <td><h3>Region:*</h3></td>
            <td><input type="text" name="" id="" required></td>
            <td><h3>Province:*</h3></td>
            <td><input type="text" name="" id="" required></td>
            <td><h3>City:*</h3></td>
            <td><input type="text" name="" id="" required></td>
        </tr>

        <tr>
            <td><h3>Barangay:*</h3></td>
            <td><input type="text" name="" id="" required></td>
            <td><h3>House No/Street:*</h3></td>
            <td><input type="text" name="" id="" required></td>
            <td><h3>Contact No:*</h3></td>
            <td><input type="text" name="" id="" required></td>
        </tr>
        </tr>
            <td valign="top"><h3>Credentials Submitted:*</h3></td>
            <td colspan="2" >
            <input type="checkbox" name="" id="1" required> 
            <label for="1"> <b>Form-138 (High School Card)</b></label> <br>
            <input type="checkbox" name="" id="2" required> 
            <label for="2"> <b>Form-137</b></label> <br>
            <input type="checkbox" name="" id="3" required> 
            <label for="3"> <b>Birth Certificate</b></label> <br>
            <input type="checkbox" name="" id="4" required> 
            <label for="4"> <b>Good Moral Certificate</b></label> <br>
            <input type="checkbox" name="" id="5" required> 
            <label for="5"> <b>Certificate Of Transfer Credentials</b></label> <br>
            <input type="checkbox" name="" id="6" required> 
            <label for="6"> <b>Transcript Of Records</b></label> <br>
            <input type="checkbox" name="" id="7" required > 
            <label for="7"> <b>Summer Permit/Permit Of Cross Enroll</b></label> <br>
            <input type="checkbox" name="" id="8" required> 
            <label for="8"> <b>Picture</b></label> <br>
            <input type="checkbox" name="" id="9" required> 
            <label for="9"> <b>PSA/NSO</b></label> <br>

            <input type="submit" value="Submit"  style="background-color: mediumaquamarine; color: white; 
            width: 200px; border-radius: 5px; border: 0; " >
            <input type="reset" value="clear" style="background-color: maroon; color: black; 
            width: 200px; border-radius: 5px; border: 0; font-family: bold;" >
            </td>
    </table>
    </form>
</body>
</html>
